; PlatformIO build config — three targets sharing one ESP32 board def.
;   pio run -e blink  -t upload   → smoke test (onboard LED + serial)
;   pio run -e vest   -t upload   → hit-detection firmware
;   pio run -e weapon -t upload   → 3.6kHz blade transmitter (Variant E bench)

[platformio]
src_dir = firmware

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

[env:blink]
build_src_filter = +<blink/>

[env:vest]
build_src_filter = +<vest/>
lib_deps =
    fastled/FastLED @ ^3.6
    miguelbalboa/MFRC522 @ ^1.4

[env:weapon]
build_src_filter = +<weapon/>
