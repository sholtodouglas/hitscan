; PlatformIO build config
;   ./flash.sh blink          → smoke test (onboard LED + serial)
;   ./flash.sh vest-piezo     → calibration mode, piezo bus on GPIO 32
;   ./flash.sh vest-pressure  → calibration mode, FSR/Velostat divider
;   ./flash.sh vest-button    → calibration mode, microswitch / LM567
;   ./flash.sh vest-nfc       → calibration mode, RC522 reader
;   ./flash.sh vest           → game mode (CALIBRATION=0, MODE_PIEZO)
;   ./flash.sh weapon         → 3.6kHz blade transmitter

[platformio]
src_dir = firmware

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

[env:blink]
build_src_filter = +<blink/>

[vest_base]
build_src_filter = +<vest/>
lib_deps =
    fastled/FastLED @ ^3.6
    miguelbalboa/MFRC522 @ ^1.4
    adafruit/Adafruit PN532 @ ^1.3
    adafruit/Adafruit BusIO @ ^1.16

[env:vest]
extends = vest_base

[env:vest-game]
extends = vest_base
build_flags = -DCALIBRATION=0 -DSENSOR_MODE=MODE_PRESSURE -DHIT_THRESHOLD=3000

[env:vest-piezo]
extends = vest_base
build_flags = -DCALIBRATION=1 -DSENSOR_MODE=MODE_PIEZO

[env:vest-pressure]
extends = vest_base
build_flags = -DCALIBRATION=1 -DSENSOR_MODE=MODE_PRESSURE

[env:vest-button]
extends = vest_base
build_flags = -DCALIBRATION=1 -DSENSOR_MODE=MODE_BUTTON

[env:vest-nfc]
extends = vest_base
build_flags = -DCALIBRATION=1 -DSENSOR_MODE=MODE_NFC

[env:vest-nfc-pn532]
extends = vest_base
build_flags = -DCALIBRATION=1 -DSENSOR_MODE=MODE_NFC_PN532

[env:weapon]
build_src_filter = +<weapon/>
